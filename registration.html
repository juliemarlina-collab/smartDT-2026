<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Create Profile — Smart DT Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-logo">
    <img src="assets/brand/logo-icon.png" alt="" onerror="this.style.display='none'">
    <p class="auth-logo-text">Smart DT Project</p>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Create Your Profile</h1>
    <p class="auth-sub">Already registered? <a href="login.html" class="auth-link">Log in here</a></p>
    <form id="registrationForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="df_student_name">Full Name</label>
        <input id="df_student_name" name="df_student_name" type="text" class="form-input" placeholder="e.g. Siti Nurhaliza binti Ahmad" required>
        <p class="form-error" id="err_name">Please enter your full name.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="df_email">Institutional Email</label>
        <input id="df_email" name="df_email" type="email" class="form-input" placeholder="e.g. sitinurhaliza@polipd.edu.my" required>
        <p class="form-error" id="err_email">Please enter a valid email.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="df_reg_no">Registration No.</label>
        <input id="df_reg_no" name="df_reg_no" type="text" class="form-input" placeholder="e.g. 01DTK23F1001" required>
        <p class="form-error" id="err_reg">Please enter your registration number.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="df_class">Class / Programme</label>
        <input id="df_class" name="df_class" type="text" class="form-input" placeholder="e.g. DTK3A / Diploma in Technology">
      </div>
      <div class="form-group">
        <label class="form-label" for="df_team">Team Name</label>
        <input id="df_team" name="df_team" type="text" class="form-input" placeholder="e.g. Team Alpha">
      </div>
      <div class="form-group">
        <label class="form-label" for="df_project_name">Project / FYP Title</label>
        <input id="df_project_name" name="df_project_name" type="text" class="form-input" placeholder="e.g. Smart Campus Canteen Queue System">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Create Profile &amp; Start →</button>
    </form>
  </div>
<script>
  document.getElementById('registrationForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var name = document.getElementById('df_student_name').value.trim();
    var email = document.getElementById('df_email').value.trim();
    var reg = document.getElementById('df_reg_no').value.trim();
    var ok = true;
    document.querySelectorAll('.form-error').forEach(function(el){ el.style.display='none'; });
    if (!name) { document.getElementById('err_name').style.display='block'; ok=false; }
    if (!email || email.indexOf('@') < 0) { document.getElementById('err_email').style.display='block'; ok=false; }
    if (!reg) { document.getElementById('err_reg').style.display='block'; ok=false; }
    if (!ok) return;
    var data = Object.fromEntries(new FormData(this));
    Object.entries(data).forEach(function(kv){ localStorage.setItem(kv[0], kv[1].trim()); });
    localStorage.setItem('df_registered', 'true');
    location.href = 'dashboard.html';
  });
</script>
</body>
</html>
