<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Log In — Smart DT Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-logo">
    <img src="assets/brand/logo-icon.png" alt="" onerror="this.style.display='none'">
    <p class="auth-logo-text">Smart DT Project</p>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">New here? <a href="registration.html" class="auth-link">Create a profile instead</a></p>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="df_email">Institutional Email</label>
        <input id="df_email" name="df_email" type="email" class="form-input" placeholder="e.g. sitinurhaliza@polipd.edu.my" required>
        <p class="form-error" id="loginEmailErr"></p>
      </div>
      <div class="form-group">
        <label class="form-label" for="df_reg_no">Registration No.</label>
        <input id="df_reg_no" name="df_reg_no" type="text" class="form-input" placeholder="e.g. 01DTK23F1001" required>
        <p class="form-error" id="loginRegErr"></p>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Log In →</button>
    </form>
    <p style="font-size:12px;color:var(--color-mid);margin-top:16px;line-height:1.6;text-align:center">Smart DT saves your profile on the browser you registered with. If you used a different device, please <a href="registration.html" class="auth-link">create a new profile</a>.</p>
  </div>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var enteredEmail = document.getElementById('df_email').value.trim().toLowerCase();
    var enteredReg   = document.getElementById('df_reg_no').value.trim().toUpperCase();
    var storedEmail  = (localStorage.getItem('df_email') || '').toLowerCase();
    var storedReg    = (localStorage.getItem('df_reg_no') || '').toUpperCase();
    document.querySelectorAll('.form-error').forEach(function(el){ el.style.display='none'; el.textContent=''; });
    if (localStorage.getItem('df_registered') === 'true' && storedEmail && storedReg) {
      if (storedEmail !== enteredEmail) {
        var el = document.getElementById('loginEmailErr');
        el.textContent = 'Email does not match the profile saved on this device.'; el.style.display = 'block'; return;
      }
      if (storedReg !== enteredReg) {
        var el2 = document.getElementById('loginRegErr');
        el2.textContent = 'Registration number does not match. Check for typos.'; el2.style.display = 'block'; return;
      }
      location.href = 'dashboard.html';
    } else {
      // No profile saved — treat as first-time, save and go
      localStorage.setItem('df_email', enteredEmail);
      localStorage.setItem('df_reg_no', enteredReg);
      localStorage.setItem('df_registered', 'true');
      location.href = 'dashboard.html';
    }
  });
</script>
</body>
</html>
