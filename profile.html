<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Profile — Smart DT Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
  <header class="header"><a href="dashboard.html" class="header-logo"><img src="assets/brand/logo-icon.png" class="header-logo-icon" alt="" onerror="this.style.display='none'"><span class="header-logo-text">Smart DT<br>Project</span></a><div class="header-right"><span style="font-size:13px;font-weight:700;color:var(--color-orange)">Profile</span></div></header>
  <div class="simple-page">
    <div class="avatar-circle" id="prof-avatar">ST</div>
    <p class="page-title" style="text-align:center" id="prof-name">Student</p>
    <p class="page-sub" style="text-align:center" id="prof-email"></p>
    <div class="card">
      <div class="profile-info-row"><span class="profile-info-label">Registration No.</span><span class="profile-info-val" id="prof-reg"></span></div>
      <div class="profile-info-row"><span class="profile-info-label">Class / Programme</span><span class="profile-info-val" id="prof-class"></span></div>
      <div class="profile-info-row"><span class="profile-info-label">Team</span><span class="profile-info-val" id="prof-team"></span></div>
      <div class="profile-info-row" style="border-bottom:none"><span class="profile-info-label">Project Title</span><span class="profile-info-val" id="prof-project" style="max-width:60%;text-align:right"></span></div>
    </div>
    <button class="btn-secondary" onclick="if(confirm('This will clear all your data on this device. Are you sure?')){ localStorage.clear(); location.href='welcome.html'; }" style="width:100%;margin-top:8px">Clear All Data & Start Over</button>
  </div>
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <a href="dashboard.html" class="nav-item" data-page="dashboard.html" aria-label="Dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-label">Dashboard</span></a>
    <a href="phase01-empathy.html" class="nav-item" data-page="phase01-empathy.html" aria-label="Learn"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg></span><span class="nav-label">Learn</span></a>
    <a href="projects.html" class="nav-item" data-page="projects.html" aria-label="Projects"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="nav-label">Projects</span></a>
    <a href="progress.html" class="nav-item" data-page="progress.html" aria-label="Progress"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="14 11 17 14 22 9"/><path d="M22 12v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9"/></svg></span><span class="nav-label">Progress</span></a>
    <a href="profile.html" class="nav-item" data-page="profile.html" aria-label="Profile"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">Profile</span></a>
  </nav>
</div>
<script>
  (function(){
    if(localStorage.getItem('df_registered')!=='true'){ location.href='welcome.html'; return; }
    var name = localStorage.getItem('df_student_name')||'Student';
    document.getElementById('prof-name').textContent = name;
    document.getElementById('prof-avatar').textContent = name.trim().split(/\s+/).slice(0,2).map(function(x){ return x[0]; }).join('').toUpperCase()||'ST';
    document.getElementById('prof-email').textContent = localStorage.getItem('df_email')||'';
    document.getElementById('prof-reg').textContent = localStorage.getItem('df_reg_no')||'—';
    document.getElementById('prof-class').textContent = localStorage.getItem('df_class')||'—';
    document.getElementById('prof-team').textContent = localStorage.getItem('df_team')||'—';
    document.getElementById('prof-project').textContent = localStorage.getItem('df_project_name')||'—';
    document.querySelectorAll('.nav-item[data-page]').forEach(function(el){ el.classList.toggle('active', el.dataset.page==='profile.html'); });
  })();
</script>
</body>
</html>
